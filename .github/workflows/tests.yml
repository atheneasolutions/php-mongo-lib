name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4']
        symfony-version: ['5.4', '6.4', '7.4', '8.0']
        include:
          - php-version: '8.1'
            symfony-version: '5.4'
          - php-version: '8.1'
            symfony-version: '6.4'

    steps:
      - uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mongodb

      - name: Install Composer dependencies
        run: composer install --no-interaction --ignore-platform-req=ext-mongodb

      - name: Install Symfony ${{ matrix.symfony-version }}
        run: |
          composer require \
            symfony/property-info:^${{ matrix.symfony-version }} \
            symfony/property-access:^${{ matrix.symfony-version }} \
            symfony/serializer:^${{ matrix.symfony-version }} \
            --with-all-dependencies \
            --no-interaction \
            --ignore-platform-req=ext-mongodb

      - name: Run tests
        run: vendor/bin/phpunit